server {
    listen 80;
    index index.html;

    # ── Python FastAPI backend ────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8090;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Forward admin session header (used by admin app for API calls)
        proxy_set_header   X-Admin-Token     $http_x_admin_token;
        proxy_read_timeout 120s;
    }

    # ── Admin Dashboard (served at /admin/) ──────────────────────────────────
    # The admin app is built with BASE_PATH=/admin so all its assets are at
    # /admin/assets/... — nginx must serve them from /usr/share/nginx/admin/
    location /admin/ {
        alias /usr/share/nginx/admin/;
        try_files $uri $uri/ /admin/index.html;
    }

    # Handle /admin (without trailing slash) → redirect to /admin/
    location = /admin {
        return 301 /admin/;
    }

    # ── User Frontend (React SPA) ─────────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/javascript;
    gzip_min_length 1024;
}
