kind = "web"
previewPath = "/"
title = "Stock Market Frontend"
version = "1.0.0"

[[services]]
localPort = 3002
name = "web"
paths = ["/"]

[services.development]
run = "BASE_PATH=/ PORT=3002 pnpm --filter @workspace/nestjs-backend-placeholder run dev"

[services.production]
serve = "static"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/nestjs-backend-placeholder", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/"
