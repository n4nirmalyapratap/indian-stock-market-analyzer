version: "3.9"

# ── Indian Stock Market Analyzer — Docker Compose ─────────────────────────────
#
# Two containers:
#   backend   — Python FastAPI on port 8090 (internal)
#   frontend  — nginx serving built React app on port 80 (public)
#               nginx also proxies /api/* → backend:8090
#
# First-time setup:
#   cp .env.example .env        # fill in your keys
#   bash scripts/setup-git-hook.sh   # auto-restart on git pull
#   docker compose up --build -d
#
# Deploy / update (manual):
#   bash deploy.sh
#
# Then open:  http://localhost
# API health: http://localhost/api/healthz
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Python FastAPI backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./artifacts/python-backend
      dockerfile: Dockerfile
    container_name: stock-backend
    restart: unless-stopped
    environment:
      PORT: "8090"
      SESSION_SECRET: "${SESSION_SECRET:-changeme-in-production}"
      # Clerk — required for JWT auth middleware
      CLERK_SECRET_KEY: "${CLERK_SECRET_KEY}"
      CLERK_PUBLISHABLE_KEY: "${CLERK_PUBLISHABLE_KEY}"
      # Optional bot integrations
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID:-}"
      TWILIO_AUTH_TOKEN: "${TWILIO_AUTH_TOKEN:-}"
    ports:
      # Expose directly for debugging (remove in production if not needed)
      - "8090:8090"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8090/api/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── React/Vite frontend via nginx ───────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: artifacts/stock-market-app/Dockerfile
      args:
        # Clerk publishable key is embedded in the frontend JS bundle at build time
        VITE_CLERK_PUBLISHABLE_KEY: "${VITE_CLERK_PUBLISHABLE_KEY}"
    container_name: stock-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
