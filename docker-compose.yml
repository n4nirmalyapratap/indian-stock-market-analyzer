version: "3.9"

# ── Indian Stock Market Analyzer — Docker Compose ─────────────────────────────
#
# Two containers:
#   backend   — Python FastAPI on port 8090 (internal)
#   frontend  — nginx on port 80 (public), serves BOTH apps:
#                 /          → User stock market app (Clerk auth)
#                 /admin/    → Admin dashboard (username/password login)
#                 /api/*     → Proxied to backend
#
# ── First-time setup ──────────────────────────────────────────────────────────
#   cp .env.example .env          # fill in your keys (see SETUP.md)
#   docker compose up --build -d
#
# ── After any git pull ────────────────────────────────────────────────────────
#   git pull && docker compose up --build -d   # --build is REQUIRED
#
# ── URLs ──────────────────────────────────────────────────────────────────────
#   User app:      http://localhost
#   Admin panel:   http://localhost/admin
#   API health:    http://localhost/api/healthz
#   API docs:      http://localhost:8090/docs
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Python FastAPI backend ──────────────────────────────────────────────────
  backend:
    build:
      context: ./artifacts/python-backend
      dockerfile: Dockerfile
    container_name: stock-backend
    restart: unless-stopped
    environment:
      PORT: "8090"

      # ── Auth (Clerk — user app JWT verification) ──────────────────────────
      CLERK_SECRET_KEY:      "${CLERK_SECRET_KEY}"
      CLERK_PUBLISHABLE_KEY: "${CLERK_PUBLISHABLE_KEY}"

      # ── Admin dashboard credentials ───────────────────────────────────────
      ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD}"          # REQUIRED — set in .env

      # ── Optional integrations ─────────────────────────────────────────────
      TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-}"
      TWILIO_ACCOUNT_SID: "${TWILIO_ACCOUNT_SID:-}"
      TWILIO_AUTH_TOKEN:  "${TWILIO_AUTH_TOKEN:-}"

      # ── File logging for /api/admin/logs (optional) ───────────────────────
      # Uncomment and adjust path to enable log tailing in admin dashboard.
      # LOG_FILE: "/app/logs/app.log"

    ports:
      # Exposed for direct API access / debugging.
      - "8090:8090"

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8090/api/healthz')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s


  # ── Combined nginx frontend (user app + admin dashboard) ───────────────────
  frontend:
    build:
      context: .
      dockerfile: artifacts/stock-market-app/Dockerfile
      args:
        # Clerk publishable key is baked into the user app JS bundle at build time.
        # The admin dashboard does NOT need this — it uses username/password login.
        VITE_CLERK_PUBLISHABLE_KEY: "${VITE_CLERK_PUBLISHABLE_KEY}"
    container_name: stock-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
